name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "gofmt issues in:"; echo "$out"; exit 1
          fi
      - name: go mod tidy
        run: |
          go mod tidy
          if ! git diff --exit-code -- go.mod go.sum; then
            echo "go.mod / go.sum out of sync — run 'go mod tidy' locally"; exit 1
          fi
      - run: go vet ./...
      - run: go test -race -coverprofile=cov.out ./...
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: cov.out

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - uses: golangci/golangci-lint-action@v8
        with:
          # Pin a known-good version. Bump deliberately — a 'latest'-style
          # value lets a new lint release red the master branch out of nowhere.
          # v2.x required: v1.x is built on Go 1.23 and rejects go 1.26 modules.
          version: v2.3.0
